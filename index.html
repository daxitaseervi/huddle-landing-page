<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="landing-page">
    <header class="landing-page__header">
      <img src="images/logo.svg" alt="Huddle Logo">
    </header>

    <article class="landing-page__body">
      <div class="landing-page__body-img">
        <img src="images/illustration-mockups.svg" alt="Mobile and tablet illustration">
      </div>

      <div class="landing-page__body-content">
        <h1 class="landing-page__body-title">
          Build The Community Your Fans Will Love
        </h1>

        <p class="landing-page__body-desc">
          Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion.
        </p>

        <button class="landing-page__body-btn">Register</button>
      </div>
    </article>

    <footer class="landing-page__footer">
      <img src="images/facebook-icon.svg" alt="Facebook icon">
      <img src="images/twitter-icon.svg" alt="Twitter icon">
      <img src="images/instagram-icon.svg" alt="Instagram icon">
    </footer>
  </main> 
</body>
</html>
